<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }

        .option {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 200px;
            cursor: pointer;
        }
        .correct {
            background-color: green;
            color: white;
        }
        .wrong {
            background-color: red;
            color: white;
        }
    </style>
</head>
<body>
    <h1> JAVASCRIPT QUIZ</h1>
    <div id="quiz">
        <h2 id="question"></h2>
        <div id="answers"></div>
    </div>
    <script src="quiz.js"></script>
</body>
</html>
